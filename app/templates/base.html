<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
  <header class="topbar">
    {% set current_path = request.url.path %}
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark">DS</span>
        <span>{{ app_name }}</span>
      </a>
      <nav class="nav-links" aria-label="Hauptnavigation">
        <a class="{% if current_path == '/' %}active{% endif }}" href="/">Dashboard</a>
        <a class="{% if current_path.startswith('/groups') %}active{% endif }}" href="/groups">Gruppen</a>
        <a class="{% if current_path.startswith('/schedules') %}active{% endif }}" href="/schedules">Zeitplaene</a>
      </nav>
    </div>
  </header>

  <main class="page">
    {% if message %}
      <div class="alert success">{{ message }}</div>
    {% endif %}
    {% if error %}
      <div class="alert error">{{ error }}</div>
    {% endif %}
    {% if docker_error %}
      <div class="alert error">{{ docker_error }}</div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
