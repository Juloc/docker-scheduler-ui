{% extends "base.html" %}

{% block content %}
<section class="section-header">
  <div>
    <h1>{% if schedule %}Edit Schedule{% else %}Create Schedule{% endif %}</h1>
    <p>If no weekdays are selected, the schedule runs daily.</p>
  </div>
</section>

<form class="form" method="post" action="{% if schedule %}/schedules/{{ schedule.id }}/edit{% else %}/schedules/new{% endif %}">
  <label>
    Name
    <input type="text" name="name" value="{{ schedule.name if schedule else '' }}" required>
  </label>

  <label>
    Target
    <select name="target" required>
      <optgroup label="Container">
        {% for container in containers %}
        {% set value = 'container:' ~ container.name %}
        <option value="{{ value }}" {% if schedule and schedule.target_type == 'container' and (schedule.target_id == container.name or schedule.target_id == container.id) %}selected{% endif %}>{{ container.name }}</option>
        {% endfor %}
        {% if schedule and schedule.target_type == 'container' and containers|selectattr('name', 'equalto', schedule.target_id)|list|length == 0 and containers|selectattr('id', 'equalto', schedule.target_id)|list|length == 0 %}
        <option value="container:{{ schedule.target_id }}" selected>Container {{ schedule.target_id }} (not found)</option>
        {% endif %}
      </optgroup>
      <optgroup label="Groups">
        {% for group in groups %}
        {% set value = 'group:' ~ group.id %}
        <option value="{{ value }}" {% if schedule and schedule.target_type == 'group' and schedule.target_id == group.id|string %}selected{% endif %}>{{ group.name }}</option>
        {% endfor %}
      </optgroup>
    </select>
  </label>

  <label>
    Action
    <select name="action" required>
      {% for action in actions %}
      <option value="{{ action }}" {% if schedule and schedule.action == action %}selected{% endif %}>{{ action }}</option>
      {% endfor %}
    </select>
  </label>

  <label>
    Time
    <input type="time" name="time" value="{% if schedule %}{{ '%02d:%02d'|format(schedule.hour, schedule.minute) }}{% else %}08:00{% endif %}" required>
  </label>

  <fieldset>
    <legend>Weekdays</legend>
    <div class="checkbox-row">
      {% for value, label in weekdays %}
      <label class="checkbox">
        <input type="checkbox" name="weekdays" value="{{ value }}" {% if value in selected_weekdays %}checked{% endif %}>
        {{ label }}
      </label>
      {% endfor %}
    </div>
  </fieldset>

  <label class="checkbox">
    <input type="checkbox" name="enabled" {% if not schedule or schedule.enabled %}checked{% endif %}>
    Active
  </label>

  <div class="form-actions">
    <button class="primary" type="submit">Save</button>
    <a class="button secondary" href="/schedules">Cancel</a>
  </div>
</form>
{% endblock %}
