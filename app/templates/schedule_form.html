{% extends "base.html" %}

{% block content %}
<section class="section-header">
  <div>
    <h1>{% if schedule %}Edit Schedule{% else %}Create Schedule{% endif %}</h1>
    <p>Choose a target, action and time. Leave weekdays empty to run daily.</p>
  </div>
</section>

<form class="form" method="post" action="{% if schedule %}/schedules/{{ schedule.id }}/edit{% else %}/schedules/new{% endif %}">
  <div class="form-grid two-col">
    <label>
      Name
      <input type="text" name="name" value="{{ schedule.name if schedule else '' }}" required>
    </label>

    <label>
      Target
      <select name="target" required>
        <optgroup label="Container">
          {% for container in containers %}
          {% set value = 'container:' ~ container.name %}
          <option value="{{ value }}" {% if schedule and schedule.target_type == 'container' and (schedule.target_id == container.name or schedule.target_id == container.id) %}selected{% endif %}>{{ container.name }}</option>
          {% endfor %}
        </optgroup>
        <optgroup label="Groups">
          {% for group in groups %}
          {% set value = 'group:' ~ group.id %}
          <option value="{{ value }}" {% if schedule and schedule.target_type == 'group' and schedule.target_id == group.id|string %}selected{% endif %}>{{ group.name }}</option>
          {% endfor %}
        </optgroup>
      </select>
    </label>

    <label>
      Action
      <select name="action" required>
        {% for action in actions %}<option value="{{ action }}" {% if schedule and schedule.action == action %}selected{% endif %}>{{ action|capitalize }}</option>{% endfor %}
      </select>
    </label>

    <label>
      Time
      <input type="time" name="time" value="{% if schedule %}{{ '%02d:%02d'|format(schedule.hour, schedule.minute) }}{% else %}08:00{% endif %}" required>
    </label>
  </div>

  <fieldset>
    <legend>Weekdays</legend>
    <div class="checkbox-row">
      {% for value, label in weekdays %}
      <label class="checkbox"><input type="checkbox" name="weekdays" value="{{ value }}" {% if value in selected_weekdays %}checked{% endif %}>{{ label }}</label>
      {% endfor %}
    </div>
  </fieldset>

  <label class="checkbox"><input type="checkbox" name="enabled" {% if not schedule or schedule.enabled %}checked{% endif %}>Active</label>

  <details class="advanced-options">
    <summary>Advanced options</summary>
    <div class="form-grid two-col advanced-grid">
      <label>
        NAS profile
        <select name="nas_profile_id">
          <option value="">None</option>
          {% for profile in nas_profiles %}
          <option value="{{ profile.id }}" {% if schedule and schedule.nas_profile_id == profile.id %}selected{% endif %}>{{ profile.name }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Conflict behavior
        <select name="conflict_policy">
          <option value="skip" {% if not schedule or schedule.conflict_policy != 'cancel_and_start' %}selected{% endif %}>Skip if targets are busy</option>
          <option value="cancel_and_start" {% if schedule and schedule.conflict_policy == 'cancel_and_start' %}selected{% endif %}>Cancel current run and start</option>
        </select>
      </label>
    </div>
    <label class="checkbox"><input type="checkbox" name="require_nas" {% if schedule and schedule.require_nas %}checked{% endif %}>Require assigned NAS to be ready before running</label>
  </details>

  <div class="form-actions">
    <button class="primary" type="submit">Save</button>
    <a class="button secondary" href="/schedules">Cancel</a>
  </div>
</form>
{% endblock %}
