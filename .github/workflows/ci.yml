name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Tests
        run: pytest -vv --tb=short --junitxml=pytest.xml

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Compile check
        run: python -m compileall -q app

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION="$(tr -d '\r\n' < VERSION)" \
            --build-arg APP_COMMIT="${GITHUB_SHA}" \
            -t docker-scheduler-ui:ci .
